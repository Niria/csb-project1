<!DOCTYPE html>
<html lang="en">

<head>
  <title>Message Board - {% block title %}{% endblock %}</title>
</head>

<body>
  {% include 'message_board/navbar.html' %}
  <div>
    {% if messages %}
    <ul>
      {% for message in messages %}
      <li style="color: red;">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
  <footer>
  </footer>
</body>

</html>
