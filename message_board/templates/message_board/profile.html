<div>
  <h2>Profile</h2>
  <table>
    <tr>
      <td>Username: </td>
      <td>{{ user.username }}</td>

    <tr>
      <td>Email: </td>
      <td>{{ user.email }}</td>
    </tr>
  </table>
</div>
{% endblock content %}
